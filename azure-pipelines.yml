trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.10'

- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
  displayName: Install dependencies

- script: |
    pytest
  displayName: Run pytest
  env:
    API_ENDPOINT_JSONPLACEHOLDER: $(API_ENDPOINT_JSONPLACEHOLDER)
    API_ENDPOINT_RESTFULBOOKER: $(API_ENDPOINT_RESTFULBOOKER)

- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: report
    artifactName: Pytest-test-report